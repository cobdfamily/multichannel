name: test

# Canonical Python+uv test workflow (mirrors atrium / medici /
# notaio / brian / dispatch). Lint runs ruff; pytest runs the
# main service suite. The signalwire-relay sidecar has its
# own uv project under sidecar/ -- it gets its own job so a
# failure there doesn't mask the main suite.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync
      - name: ruff check
        run: uv run ruff check src tests

  pytest:
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync
      - name: run pytest
        run: uv run pytest -q

  sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sidecar/signalwire-relay
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync
      - name: ruff check
        run: uv run ruff check src tests
      - name: run pytest
        run: uv run pytest -q
